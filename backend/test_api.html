<!DOCTYPE html>
<html>
<head>
    <title>心理健康预测结果展示</title>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #2c3e50;
            border-left: 4px solid #3498db;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .status-ok {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .prediction-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        .prediction-title {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .prediction-value {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        .score {
            font-size: 36px;
            font-weight: bold;
            color: #f39c12;
        }
        .confidence {
            font-size: 24px;
            font-weight: bold;
            color: #2ecc71;
        }
        .contributions {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .contribution-item {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .contribution-value {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        .contribution-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .contribution-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.3s ease;
        }
        .explanation {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            line-height: 1.6;
            color: #2c3e50;
        }
        .timestamp {
            font-size: 12px;
            color: #7f8c8d;
            text-align: center;
            margin-top: 20px;
        }
        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
            transition: background 0.3s;
        }
        .refresh-btn:hover {
            background: #2980b9;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        .feature-info {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🧠 心理健康预测结果</h1>
            <div id="status" class="status status-ok">✅ 正在加载最新预测数据...</div>

            <button class="refresh-btn" onclick="loadLatestPrediction()">🔄 刷新数据</button>

            <div id="prediction-content">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 预测结果文件路径（Python脚本生成的JSON文件）
        const PREDICTION_FILE = 'static/predictions/latest_prediction.json';

        async function loadLatestPrediction() {
            const statusDiv = document.getElementById('status');
            const contentDiv = document.getElementById('prediction-content');

            statusDiv.innerHTML = '⏳ 正在加载最新预测数据...';
            statusDiv.className = 'status';
            contentDiv.innerHTML = '<div class="loading">加载中...</div>';

            try {
                // 添加时间戳防止缓存
                const url = `${PREDICTION_FILE}?t=${Date.now()}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.success) {
                    displayPrediction(data);
                    statusDiv.innerHTML = '✅ 数据加载成功';
                    statusDiv.className = 'status status-ok';
                } else {
                    throw new Error(data.error || '预测失败');
                }

            } catch (error) {
                console.error('加载失败:', error);
                statusDiv.innerHTML = '❌ 加载失败: ' + error.message;
                statusDiv.className = 'status status-error';
                contentDiv.innerHTML = `
                    <div class="prediction-card" style="background: #e74c3c;">
                        <div class="prediction-title">⚠️ 无法加载预测数据</div>
                        <div style="margin-top: 15px;">请先运行预测脚本: <code>python test_predict_with_real_data.py</code></div>
                        <div style="margin-top: 10px; font-size: 14px;">错误信息: ${error.message}</div>
                    </div>
                `;
            }
        }

        function displayPrediction(data) {
            // 根据压力分数设置颜色
            let scoreColor = '#3498db';
            if (data.score < 30) scoreColor = '#27ae60';
            else if (data.score < 50) scoreColor = '#f39c12';
            else if (data.score < 70) scoreColor = '#e67e22';
            else scoreColor = '#e74c3c';

            // 根据预测结果设置背景色
            let predictionBg = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            if (data.prediction === '健康') predictionBg = 'linear-gradient(135deg, #27ae60 0%, #2ecc71 100%)';
            else if (data.prediction === '轻度压力') predictionBg = 'linear-gradient(135deg, #f39c12 0%, #f1c40f 100%)';
            else if (data.prediction === '中度压力') predictionBg = 'linear-gradient(135deg, #e67e22 0%, #f39c12 100%)';
            else if (data.prediction === '重度压力') predictionBg = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';

            const html = `
                <div class="prediction-card" style="background: ${predictionBg};">
                    <div class="prediction-title">心理状态预测</div>
                    <div class="prediction-value">${data.prediction}</div>
                    <div style="margin-top: 10px;">
                        <span style="font-size: 14px;">压力分数: </span>
                        <span class="score">${data.score} 分</span>
                    </div>
                    <div style="margin-top: 5px;">
                        <span style="font-size: 14px;">置信度: </span>
                        <span class="confidence">${data.confidence_percent}%</span>
                    </div>
                </div>

                <h3 style="margin: 20px 0 10px 0;">📊 各模态贡献度</h3>
                <div class="contributions">
                    <div class="contribution-item">
                        <div>😊 面部表情</div>
                        <div class="contribution-value">${data.contributions.face}%</div>
                        <div class="contribution-bar">
                            <div class="contribution-fill" style="width: ${data.contributions.face}%;"></div>
                        </div>
                    </div>
                    <div class="contribution-item">
                        <div>🎤 语音特征</div>
                        <div class="contribution-value">${data.contributions.audio}%</div>
                        <div class="contribution-bar">
                            <div class="contribution-fill" style="width: ${data.contributions.audio}%;"></div>
                        </div>
                    </div>
                    <div class="contribution-item">
                        <div>❤️ 心率变化</div>
                        <div class="contribution-value">${data.contributions.hr}%</div>
                        <div class="contribution-bar">
                            <div class="contribution-fill" style="width: ${data.contributions.hr}%;"></div>
                        </div>
                    </div>
                </div>

                <h3>💡 分析解释</h3>
                <div class="explanation">
                    ${data.explanation}
                </div>

                ${data.feature_summary ? `
                <h3>📈 特征数据摘要</h3>
                <div class="feature-info">
                    <div><strong>面部特征:</strong> 范围 [${data.feature_summary.face_min}, ${data.feature_summary.face_max}]</div>
                    <div><strong>音频特征:</strong> 范围 [${data.feature_summary.audio_min}, ${data.feature_summary.audio_max}]</div>
                    <div><strong>心率特征:</strong> 范围 [${data.feature_summary.hr_min}, ${data.feature_summary.hr_max}]</div>
                </div>
                ` : ''}

                <div class="timestamp">
                    <div>🕐 预测时间: ${new Date(data.timestamp).toLocaleString()}</div>
                    ${data.data_timestamp ? `<div>📁 数据采集时间: ${data.data_timestamp}</div>` : ''}
                    <div>🔧 使用模型: ${data.model_used}</div>
                </div>
            `;

            document.getElementById('prediction-content').innerHTML = html;
        }

        // 页面加载时自动加载数据
        loadLatestPrediction();

        // 每30秒自动刷新
        setInterval(loadLatestPrediction, 30000);
    </script>
</body>
</html>
